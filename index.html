<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LA DIVIDIDA F6 — Complejo 3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0e13; font-family: system-ui, sans-serif; }
  #app { width: 100vw; height: 100vh; display: block; }
  #ui {
    position: fixed; left: 16px; bottom: 16px; color: #e8eef6;
    background: rgba(15,20,28,0.6); backdrop-filter: blur(8px);
    padding: 12px 16px; border-radius: 12px; font-size: 13px; line-height: 1.5;
    border: 1px solid rgba(255,255,255,0.08); max-width: 260px; user-select: none;
  }
  #ui b { color: #7fe3a0; }
  #ui .keys { opacity: 0.7; font-size: 12px; margin-top: 6px; }
  #loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    color: #7fe3a0; font-size: 15px; letter-spacing: 0.5px;
  }
  .btns { position: fixed; right: 16px; top: 16px; display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
  .btns .row { display: flex; gap: 8px; }
  .btns .slider {
    display: flex; flex-direction: column; gap: 4px; align-items: flex-end;
    background: rgba(15,20,28,0.7); color: #e8eef6; border: 1px solid rgba(255,255,255,0.12);
    padding: 8px 12px; border-radius: 10px; font-size: 12px; backdrop-filter: blur(8px);
  }
  .btns .slider input { width: 130px; cursor: pointer; }
  .btns button {
    background: rgba(15,20,28,0.7); color: #e8eef6; border: 1px solid rgba(255,255,255,0.12);
    padding: 8px 12px; border-radius: 10px; font-size: 12px; cursor: pointer; backdrop-filter: blur(8px);
  }
  .btns button:hover { background: rgba(40,55,72,0.8); }
</style>
</head>
<body>
<div id="loading">Cargando cancha…</div>
<canvas id="app"></canvas>
<div id="ui">
  <b>Complejo LA DIVIDIDA · F6</b><br/>
  2 canchas 34 × 17 m · predio ~1.750 m²
  <div class="keys">
    🖱️ Arrastrar = rotar · Rueda = zoom · Click derecho = mover
  </div>
</div>
<div class="btns">
  <div class="row">
    <button id="btnDay">Día</button>
    <button id="btnNight">Noche</button>
    <button id="btnDims">Medidas</button>
  </div>
  <label class="slider">
    💡 Luces <span id="lightVal">110</span>
    <input id="lightSlider" type="range" min="0" max="400" value="110" />
  </label>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

// ---------- dimensiones cancha (metros) — F6 reducida para entrar en 1800 m² ----------
const W = 34;   // largo
const H = 17;   // ancho

// ---------- renderer ----------
const canvas = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5)); // tope para celulares
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.outputColorSpace = THREE.SRGBColorSpace;

// ---------- escena + cámara ----------
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(42, 30, 50);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.maxPolarAngle = Math.PI / 2 - 0.04; // no pasar bajo el piso
controls.minDistance = 8;
controls.maxDistance = 160;
controls.target.set(0, 1, 12.5); // centro entre las dos canchas

// ---------- textura del campo (generada en canvas) ----------
function makeFieldTexture() {
  const c = document.createElement('canvas');
  const scale = 50;            // px por metro
  c.width = W * scale;
  c.height = H * scale;
  const ctx = c.getContext('2d');

  // fondo transparente: las líneas van encima del pasto real
  ctx.clearRect(0, 0, c.width, c.height);

  // líneas blancas
  ctx.strokeStyle = 'rgba(255,255,255,0.92)';
  ctx.lineWidth = scale * 0.12;
  const m = scale * 0.7; // margen

  // borde
  ctx.strokeRect(m, m, c.width - 2 * m, c.height - 2 * m);
  // línea media
  ctx.beginPath();
  ctx.moveTo(c.width / 2, m);
  ctx.lineTo(c.width / 2, c.height - m);
  ctx.stroke();
  // círculo central
  ctx.beginPath();
  ctx.arc(c.width / 2, c.height / 2, scale * 3, 0, Math.PI * 2);
  ctx.stroke();
  // punto central
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  ctx.beginPath();
  ctx.arc(c.width / 2, c.height / 2, scale * 0.18, 0, Math.PI * 2);
  ctx.fill();

  // áreas rectangulares (estilo fútbol): área grande + área chica
  const ay = c.height / 2;
  const pD = scale * 5,  pW = scale * 12;   // área grande: 5m fondo × 12m ancho
  const gD = scale * 2,  gW = scale * 6;    // área chica:  2m fondo × 6m ancho
  // izquierda
  ctx.strokeRect(m, ay - pW / 2, pD, pW);
  ctx.strokeRect(m, ay - gW / 2, gD, gW);
  // derecha
  ctx.strokeRect(c.width - m - pD, ay - pW / 2, pD, pW);
  ctx.strokeRect(c.width - m - gD, ay - gW / 2, gD, gW);
  // puntos de penal (a 7m del arco)
  ctx.beginPath(); ctx.arc(m + scale * 7, ay, scale * 0.18, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(c.width - m - scale * 7, ay, scale * 0.18, 0, Math.PI * 2); ctx.fill();

  const tex = new THREE.CanvasTexture(c);
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

// cargador de texturas PBR (Poly Haven, CC0)
const texLoader = new THREE.TextureLoader();
function loadTex(file, srgb, rx, ry) {
  const t = texLoader.load('textures/' + file);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(rx, ry);
  if (srgb) t.colorSpace = THREE.SRGBColorSpace;
  t.anisotropy = renderer.capabilities.getMaxAnisotropy();
  return t;
}

// === grupo de la cancha (se clona para tener varias) ===
const court = new THREE.Group();
scene.add(court);

// pasto sintético (textura real con relieve)
const gr = [W / 2.5, H / 2.5];
const grass = new THREE.Mesh(
  new THREE.PlaneGeometry(W, H),
  new THREE.MeshStandardMaterial({
    map: loadTex('leafy_grass_diff_1k.jpg', true, gr[0], gr[1]),
    normalMap: loadTex('leafy_grass_nor_gl_1k.jpg', false, gr[0], gr[1]),
    roughnessMap: loadTex('leafy_grass_rough_1k.jpg', false, gr[0], gr[1]),
    color: 0x5f9248, roughness: 1, metalness: 0,
  })
);
grass.rotation.x = -Math.PI / 2;
grass.receiveShadow = true;
court.add(grass);

// líneas blancas (overlay encima del pasto)
const lines = new THREE.Mesh(
  new THREE.PlaneGeometry(W, H),
  new THREE.MeshStandardMaterial({
    map: makeFieldTexture(), transparent: true, roughness: 0.85,
    polygonOffset: true, polygonOffsetFactor: -2,
  })
);
lines.rotation.x = -Math.PI / 2;
lines.position.y = 0.012;
court.add(lines);

// base/borde de cemento real alrededor (vereda 2m)
const br = [(W + 4) / 3, (H + 4) / 3];
const base = new THREE.Mesh(
  new THREE.BoxGeometry(W + 4, 0.4, H + 4),
  new THREE.MeshStandardMaterial({
    map: loadTex('anti_slip_concrete_diff_1k.jpg', true, br[0], br[1]),
    normalMap: loadTex('anti_slip_concrete_nor_gl_1k.jpg', false, br[0], br[1]),
    roughness: 1, metalness: 0,
  })
);
base.position.y = -0.21;
base.receiveShadow = true;
court.add(base);

// ---------- textura de alambrado (chain-link) ----------
function makeFenceTexture() {
  const c = document.createElement('canvas');
  c.width = c.height = 128;
  const ctx = c.getContext('2d');
  ctx.clearRect(0, 0, 128, 128);
  ctx.strokeStyle = 'rgba(210,215,220,0.9)';
  ctx.lineWidth = 3;
  for (let i = -128; i < 256; i += 16) {
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i + 128, 128); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(i, 128); ctx.lineTo(i + 128, 0); ctx.stroke();
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  return tex;
}
const fenceTex = makeFenceTexture();
const fenceMat = new THREE.MeshStandardMaterial({
  map: fenceTex, transparent: true, alphaTest: 0.25,
  side: THREE.DoubleSide, metalness: 0.6, roughness: 0.5, color: 0xcfd6dd
});

function fencePanel(len, height, repeat) {
  const t = fenceTex.clone();
  t.needsUpdate = true;
  t.repeat.set(repeat, height / 2);
  const mat = fenceMat.clone();
  mat.map = t;
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(len, height), mat);
  return mesh;
}

const fenceH = 6;
const dw = 2.4;              // ancho de la puerta
const doorCx = W / 2 - 7;   // posición de la puerta sobre el lado frontal
const group = new THREE.Group();

// lado frontal (z = -H/2) con hueco para la puerta
{
  const z = -H / 2;
  const leftEnd = doorCx - dw / 2;
  const rightStart = doorCx + dw / 2;
  const leftLen = leftEnd - (-W / 2);
  const rightLen = (W / 2) - rightStart;
  const left = fencePanel(leftLen, fenceH, leftLen / 2);
  left.position.set((-W / 2 + leftEnd) / 2, fenceH / 2, z);
  group.add(left);
  const right = fencePanel(rightLen, fenceH, rightLen / 2);
  right.position.set((rightStart + W / 2) / 2, fenceH / 2, z);
  group.add(right);
}
// lado trasero (z = +H/2) completo
{
  const p = fencePanel(W, fenceH, W / 2);
  p.position.set(0, fenceH / 2, H / 2);
  group.add(p);
}

// portón (abre hacia adentro)
function makeGate() {
  const gate = new THREE.Group();
  const fr = new THREE.MeshStandardMaterial({ color: 0x2a2e33, metalness: 0.5, roughness: 0.5 });
  const postL = new THREE.Mesh(new THREE.BoxGeometry(0.12, fenceH, 0.12), fr); postL.position.set(0, fenceH / 2, 0);
  const postR = new THREE.Mesh(new THREE.BoxGeometry(0.12, fenceH, 0.12), fr); postR.position.set(dw, fenceH / 2, 0);
  const top = new THREE.Mesh(new THREE.BoxGeometry(dw, 0.12, 0.12), fr); top.position.set(dw / 2, fenceH, 0);
  const bot = new THREE.Mesh(new THREE.BoxGeometry(dw, 0.12, 0.12), fr); bot.position.set(dw / 2, 0.06, 0);
  [postL, postR, top, bot].forEach(p => { p.castShadow = true; gate.add(p); });
  const t = fenceTex.clone(); t.needsUpdate = true; t.repeat.set(dw / 2, fenceH / 2);
  const mat = fenceMat.clone(); mat.map = t;
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(dw, fenceH), mat);
  mesh.position.set(dw / 2, fenceH / 2, 0);
  gate.add(mesh);
  return gate;
}
const gate = makeGate();
gate.position.set(doorCx - dw / 2, 0, -H / 2);
gate.rotation.y = -1.15; // abierto hacia el interior de la cancha
court.add(gate);
// anchos (lados de 16)
[ -1, 1 ].forEach(s => {
  const p = fencePanel(H, fenceH, H / 2);
  p.rotation.y = Math.PI / 2;
  p.position.set(s * W / 2, fenceH / 2, 0);
  group.add(p);
});
court.add(group);

// red en el techo (para que no se escape la pelota)
const ceilTex = fenceTex.clone(); ceilTex.needsUpdate = true; ceilTex.repeat.set(W / 1.5, H / 1.5);
const ceiling = new THREE.Mesh(
  new THREE.PlaneGeometry(W, H),
  new THREE.MeshStandardMaterial({
    map: ceilTex, transparent: true, alphaTest: 0.25, side: THREE.DoubleSide,
    color: 0x1e1e1e, roughness: 0.9, metalness: 0.1,
  })
);
ceiling.rotation.x = -Math.PI / 2;
ceiling.position.set(0, fenceH, 0);
court.add(ceiling);

// postes del alambrado
// metal real (Poly Haven CC0) para caños/postes/torres
const metalRep = [1, 4];
const metalArm = loadTex('metal_plate_02_arm_1k.jpg', false, metalRep[0], metalRep[1]);
const postMat = new THREE.MeshStandardMaterial({
  map: loadTex('metal_plate_02_diff_1k.jpg', true, metalRep[0], metalRep[1]),
  normalMap: loadTex('metal_plate_02_nor_gl_1k.jpg', false, metalRep[0], metalRep[1]),
  roughnessMap: metalArm, metalnessMap: metalArm,
  color: 0x9aa1ab, roughness: 1, metalness: 1,
});
function post(x, z, h = fenceH + 0.3) {
  const p = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.09, h, 10), postMat);
  p.position.set(x, h / 2, z);
  p.castShadow = true;
  court.add(p);
}
for (let x = -W/2; x <= W/2 + 0.01; x += W/5) { post(x, -H/2); post(x, H/2); }
for (let z = -H/2; z <= H/2 + 0.01; z += H/4) { post(-W/2, z); post(W/2, z); }
// postes a los lados de la puerta
post(doorCx - dw / 2, -H / 2);
post(doorCx + dw / 2, -H / 2);

// ---------- arcos con red ----------
function makeGoal(side) {
  const g = new THREE.Group();
  const gw = 4, gh = 2, gd = 1.4; // ancho, alto, profundidad (arco F6)
  const barMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.4, metalness: 0.1 });
  const r = 0.07;
  // postes
  [-1, 1].forEach(s => {
    const c = new THREE.Mesh(new THREE.CylinderGeometry(r, r, gh, 12), barMat);
    c.position.set(0, gh / 2, s * gw / 2); c.castShadow = true; g.add(c);
  });
  // travesaño
  const cross = new THREE.Mesh(new THREE.CylinderGeometry(r, r, gw, 12), barMat);
  cross.rotation.x = Math.PI / 2; cross.position.set(0, gh, 0); cross.castShadow = true; g.add(cross);

  // ---- red que cuelga del travesaño y cae al piso (estilo tela) ----
  const nc = document.createElement('canvas'); nc.width = nc.height = 128;
  const nx = nc.getContext('2d');
  nx.clearRect(0, 0, 128, 128);
  nx.strokeStyle = '#f4f4f4'; nx.lineWidth = 1.4;
  for (let i = 0; i <= 128; i += 9) {
    nx.beginPath(); nx.moveTo(i, 0); nx.lineTo(i, 128); nx.stroke();
    nx.beginPath(); nx.moveTo(0, i); nx.lineTo(128, i); nx.stroke();
  }
  const netTexBase = new THREE.CanvasTexture(nc);
  netTexBase.wrapS = netTexBase.wrapT = THREE.RepeatWrapping;
  netTexBase.anisotropy = renderer.capabilities.getMaxAnisotropy();
  const netMaterial = () => new THREE.MeshStandardMaterial({
    map: netTexBase, transparent: true, alphaTest: 0.42,
    side: THREE.DoubleSide, roughness: 0.85, metalness: 0,
  });

  // perfil lateral: del travesaño (0,gh) cae con panza hasta el piso (-gd,0)
  const P0 = { x: 0, y: gh }, C = { x: -gd * 0.55, y: gh * 0.28 }, P1 = { x: -gd, y: 0 };
  const profile = t => {
    const m = 1 - t;
    return {
      x: m * m * P0.x + 2 * m * t * C.x + t * t * P1.x,
      y: m * m * P0.y + 2 * m * t * C.y + t * t * P1.y,
    };
  };
  const cell = 0.13; // tamaño del cuadro de la red (m)
  const nu = 28, nv = 18;

  // superficie principal (techo + fondo cayendo) con hamaca entre postes
  {
    const posA = [], uvA = [], idxA = [];
    for (let j = 0; j <= nv; j++) {
      const t = j / nv, p = profile(t);
      for (let i = 0; i <= nu; i++) {
        const u = i / nu;
        const z = (u - 0.5) * gw;
        const sag = Math.sin(Math.PI * u) * Math.sin(Math.PI * t) * gh * 0.10;
        posA.push(p.x, p.y - sag, z);
        uvA.push(u * gw / cell, t * (gh + gd) / cell);
      }
    }
    for (let j = 0; j < nv; j++) for (let i = 0; i < nu; i++) {
      const a = j * (nu + 1) + i, b = a + 1, c2 = a + nu + 1, d = c2 + 1;
      idxA.push(a, c2, b, b, c2, d);
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(posA, 3));
    geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvA, 2));
    geo.setIndex(idxA); geo.computeVertexNormals();
    const mesh = new THREE.Mesh(geo, netMaterial());
    mesh.castShadow = true; g.add(mesh);
  }

  // laterales: triángulo curvo entre poste, piso y la caída de la red
  [-1, 1].forEach(s => {
    const posS = [s === 1 ? 0 : 0, 0, s * gw / 2], uvS = [0, 0], idxS = [];
    for (let j = 0; j <= nv; j++) {
      const p = profile(j / nv);
      posS.push(p.x, p.y, s * gw / 2);
      uvS.push(-p.x / cell, p.y / cell);
    }
    for (let j = 1; j <= nv; j++) idxS.push(0, j, j + 1);
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(posS, 3));
    geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvS, 2));
    geo.setIndex(idxS); geo.computeVertexNormals();
    g.add(new THREE.Mesh(geo, netMaterial()));
  });

  g.position.set(side * (W / 2 - 0.7), 0, 0);
  if (side < 0) g.rotation.y = Math.PI;
  court.add(g);
}
makeGoal(1);
makeGoal(-1);

// ---------- torres de iluminación (se construyen luego de clonar, en coords de mundo) ----------
const lampTargets = [];

// ---------- pelota ----------
const ball = new THREE.Mesh(
  new THREE.SphereGeometry(0.22, 32, 32),
  new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.35 })
);
ball.position.set(2, 0.22, -3); ball.castShadow = true;
court.add(ball);

// ---------- segunda cancha al lado (paralela, clon del grupo) ----------
const COURT_OFFSET = H + 8; // separación entre canchas en Z (pasillo central 8 m)
const court2 = court.clone();
court2.position.z = COURT_OFFSET;
scene.add(court2);

// ---------- torres de iluminación unificadas ----------
const court1Z = 0, court2Z = COURT_OFFSET;
const zc = (court1Z + court2Z) / 2;            // 15: línea divisoria
const towerXs = [-W / 2 - 2, 0, W / 2 + 2];
const aimFor = (x, z, cz) => ({ tx: x * 0.5, tz: cz + (z - cz) * 0.45 });

function buildTower(x, z, aims, opts = {}) {
  const factor = opts.factor ?? 1;          // multiplicador de intensidad (slider lo respeta)
  const angle = opts.angle ?? Math.PI / 3;  // apertura del cono
  const h = 9;
  const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.25, h, 12), postMat);
  pole.position.set(x, h / 2, z); pole.castShadow = true; scene.add(pole);
  aims.forEach(aim => {
    const head = new THREE.Group();
    head.position.set(x, h, z);
    // brazo que separa el cabezal del poste (hacia su cancha)
    const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 1.1, 8), postMat);
    arm.rotation.x = Math.PI / 2; arm.position.set(0, 0, 0.55);
    head.add(arm);
    const housing = new THREE.Mesh(new THREE.BoxGeometry(2, 0.5, 0.6),
      new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.35, metalness: 0.95 }));
    housing.position.set(0, 0, 1.1);
    head.add(housing);
    for (let i = -1; i <= 1; i++) {
      const b = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.35, 0.1),
        new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffee, emissiveIntensity: 1 }));
      b.position.set(i * 0.6, 0, 1.1 + 0.33);
      head.add(b);
    }
    head.lookAt(aim.tx, 1, aim.tz);
    scene.add(head);
    const spot = new THREE.SpotLight(0xfff4e0, 0, 90, angle, 0.7, 1.0);
    spot.position.set(x, h, z);
    spot.target.position.set(aim.tx, 0, aim.tz);
    spot.castShadow = true;
    spot.shadow.mapSize.set(1024, 1024);
    spot.userData.factor = factor;
    scene.add(spot); scene.add(spot.target);
    lampTargets.push(spot);
  });
}

towerXs.forEach(x => {
  // torres externas: 1 cabezal mirando a su cancha
  buildTower(x, court1Z - (H / 2 + 2), [aimFor(x, court1Z - (H / 2 + 2), court1Z)]);
  buildTower(x, court2Z + (H / 2 + 2), [aimFor(x, court2Z + (H / 2 + 2), court2Z)]);
  // torre central UNIFICADA: doble cabezal, cono angosto y atenuado (evita doble luz en el medio)
  buildTower(x, zc, [aimFor(x, zc, court1Z), aimFor(x, zc, court2Z)], { factor: 0.55, angle: Math.PI / 4.5 });
});

// ---------- plaza de cemento que une el complejo ----------
const plazaRep = [42 / 2.5, 52 / 2.5];
const plaza = new THREE.Mesh(
  new THREE.BoxGeometry(42, 0.4, 52),
  new THREE.MeshStandardMaterial({
    map: loadTex('gravel_stones_diff_1k.jpg', true, plazaRep[0], plazaRep[1]),
    normalMap: loadTex('gravel_stones_nor_gl_1k.jpg', false, plazaRep[0], plazaRep[1]),
    roughnessMap: loadTex('gravel_stones_arm_1k.jpg', false, plazaRep[0], plazaRep[1]),
    color: 0xc4c6c8, roughness: 1, metalness: 0,
  })
);
plaza.position.set(0, -0.27, COURT_OFFSET / 2);
plaza.receiveShadow = true;
scene.add(plaza);

// ---------- suelo de piedra gris del predio ----------
const pebSize = 150, pebRep = pebSize / 2;
const pebbles = new THREE.Mesh(
  new THREE.PlaneGeometry(pebSize, pebSize),
  new THREE.MeshStandardMaterial({
    map: loadTex('gravel_stones_diff_1k.jpg', true, pebRep, pebRep),
    normalMap: loadTex('gravel_stones_nor_gl_1k.jpg', false, pebRep, pebRep),

// ---------- contenedor marítimo = cantina (en el medio) ----------
function stripeTex() {
  const cv = document.createElement('canvas'); cv.width = 256; cv.height = 32;
  const x = cv.getContext('2d');
  for (let i = 0; i < 8; i++) { x.fillStyle = i % 2 ? '#eeeeee' : '#b8352b'; x.fillRect(i * 32, 0, 32, 32); }
  const t = new THREE.CanvasTexture(cv); t.colorSpace = THREE.SRGBColorSpace; return t;
}
function signTex() {
  const cv = document.createElement('canvas'); cv.width = 512; cv.height = 160;
  const x = cv.getContext('2d');
  x.fillStyle = '#1a1a1a'; x.fillRect(0, 0, 512, 160);
  x.strokeStyle = '#ffd24a'; x.lineWidth = 8; x.strokeRect(10, 10, 492, 140);
  x.fillStyle = '#ffd24a'; x.font = 'bold 86px sans-serif'; x.textAlign = 'center'; x.textBaseline = 'middle';
  x.fillText('CANTINA', 256, 88);

}

function makeContainer() {
  const cg = new THREE.Group();
  const L = 10, D = 2.5, Ht = 2.6;

  // cuerpo: chapa acanalada tipo contenedor (rojo óxido)
  const cArm = loadTex('corrugated_iron_02_arm_1k.jpg', false, 8, 2);
  const bodyMat = new THREE.MeshStandardMaterial({
    map: loadTex('corrugated_iron_02_diff_1k.jpg', true, 8, 2),
    normalMap: loadTex('corrugated_iron_02_nor_gl_1k.jpg', false, 8, 2),
    roughnessMap: cArm, metalnessMap: cArm,
    color: 0xb23a2e, roughness: 1, metalness: 0.5,
  });
  const body = new THREE.Mesh(new THREE.BoxGeometry(L, Ht, D), bodyMat);
  body.position.y = Ht / 2; body.castShadow = true; body.receiveShadow = true;
  cg.add(body);

  // marco/esquineros del contenedor
  const frameMat = new THREE.MeshStandardMaterial({ color: 0x5a1c16, roughness: 0.55, metalness: 0.6 });
  [[-1, -1], [1, -1], [-1, 1], [1, 1]].forEach(([sx, sz]) => {
    const c = new THREE.Mesh(new THREE.BoxGeometry(0.2, Ht, 0.2), frameMat);
    c.position.set(sx * (L / 2 - 0.1), Ht / 2, sz * (D / 2 - 0.1)); c.castShadow = true; cg.add(c);
  });
  // rieles superior e inferior
  [-1, 1].forEach(sz => {
    [0.1, Ht - 0.1].forEach(yy => {
      const rail = new THREE.Mesh(new THREE.BoxGeometry(L, 0.2, 0.2), frameMat);
      rail.position.set(0, yy, sz * (D / 2 - 0.1)); cg.add(rail);
    });
  });

  // ventana de atención al FRENTE (punta +X), no a los costados
  const fx = L / 2;
  const opening = new THREE.Mesh(new THREE.BoxGeometry(0.14, 1.25, 1.9),
    new THREE.MeshStandardMaterial({ color: 0x0e1116, roughness: 0.5, metalness: 0.3 }));
  opening.position.set(fx + 0.02, 1.5, 0); cg.add(opening);
  // mostrador que sale hacia adelante
  const counter = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.12, 2.2),
    new THREE.MeshStandardMaterial({ color: 0xb9b2a6, roughness: 0.5, metalness: 0.2 }));
  counter.position.set(fx + 0.33, 0.98, 0); counter.castShadow = true; cg.add(counter);
  [-0.95, 0.95].forEach(cz => {
    const leg = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.98, 0.1), frameMat);
    leg.position.set(fx + 0.58, 0.49, cz); cg.add(leg);
  });
  // toldo a rayas hacia adelante
  const awn = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.06, 2.4),
    new THREE.MeshStandardMaterial({ map: stripeTex(), roughness: 0.8 }));
  awn.position.set(fx + 0.6, 2.3, 0); awn.rotation.z = -0.3; awn.castShadow = true; cg.add(awn);

  // cartel CANTINA sobre un lateral (visible; no es la salida)
  const sign = new THREE.Mesh(new THREE.PlaneGeometry(3.0, 0.95),
    new THREE.MeshStandardMaterial({ map: signTex(), roughness: 0.6 }));
  sign.position.set(0, 2.15, D / 2 + 0.02);
  sign.rotation.y = 0; cg.add(sign);

  return cg;
}

const furnWoodArm = loadTex('fine_grained_wood_arm_1k.jpg', false, 1, 1);
const furnWoodMat = new THREE.MeshStandardMaterial({

const furnMetalMat = new THREE.MeshStandardMaterial({ color: 0x2c3035, roughness: 0.45, metalness: 0.85 });
// textura de sombrilla: gajos de color + trama de lino real (composición multiply)
function makeUmbrellaTex() {
  const cv = document.createElement('canvas'); cv.width = 512; cv.height = 512;
  const x = cv.getContext('2d');
  const gajos = 16, gw = cv.width / gajos;
  for (let i = 0; i < gajos; i++) { x.fillStyle = i % 2 ? '#eeeeee' : '#c0392b'; x.fillRect(i * gw, 0, gw, cv.height); }
  const tex = new THREE.CanvasTexture(cv); tex.colorSpace = THREE.SRGBColorSpace;
  const img = new Image();
  img.onload = () => {
    x.globalCompositeOperation = 'multiply'; x.globalAlpha = 0.75;
    for (let a = 0; a < cv.width; a += img.width) for (let b = 0; b < cv.height; b += img.height) x.drawImage(img, a, b);
    x.globalAlpha = 1; x.globalCompositeOperation = 'source-over';
    tex.needsUpdate = true;
  };
  img.src = 'textures/rough_linen_diff_1k.jpg';
  return tex;
}
const umbrellaMat = new THREE.MeshStandardMaterial({
  map: makeUmbrellaTex(),
  normalMap: loadTex('rough_linen_nor_gl_1k.jpg', false, 5, 5),
  roughnessMap: loadTex('rough_linen_arm_1k.jpg', false, 5, 5),
  roughness: 1, metalness: 0, side: THREE.DoubleSide,
});
umbrellaMat.normalScale = new THREE.Vector2(1.6, 1.6);
function makeTableSet(umbrella) {
  const g = new THREE.Group();
  const woodMat = furnWoodMat;
  const metalMat = furnMetalMat;

  // mesa redonda
  const topY = 0.74, topR = 0.45;
  const top = new THREE.Mesh(new THREE.CylinderGeometry(topR, topR, 0.05, 24), woodMat);
  top.position.y = topY; top.castShadow = true; g.add(top);
  const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, topY, 10), metalMat);
  stem.position.y = topY / 2; g.add(stem);
  const foot = new THREE.Mesh(new THREE.CylinderGeometry(0.26, 0.3, 0.04, 16), metalMat);
  foot.position.y = 0.02; g.add(foot);

  // 4 sillas
  const seatY = 0.46, ringR = 0.82;
  for (let i = 0; i < 4; i++) {
    const a = i * Math.PI / 2 + Math.PI / 4;
    const cx = Math.cos(a) * ringR, cz = Math.sin(a) * ringR;
    const chair = new THREE.Group();
    const seat = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.18, 0.05, 16), woodMat);
    seat.position.y = seatY; seat.castShadow = true; chair.add(seat);
    const cleg = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, seatY, 8), metalMat);
    cleg.position.y = seatY / 2; chair.add(cleg);
    const cfoot = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.18, 0.03, 12), metalMat);
    cfoot.position.y = 0.015; chair.add(cfoot);
    const back = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.32, 0.04), woodMat);
    back.position.set(0, seatY + 0.2, 0.16); chair.add(back);
    chair.position.set(cx, 0, cz);
    chair.rotation.y = Math.atan2(cx, cz); // respaldo hacia afuera
    g.add(chair);
  }

  // sombrilla opcional
  if (umbrella) {
    const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 2.3, 10), metalMat);
    pole.position.y = topY + 1.15; g.add(pole);
    const canopy = new THREE.Mesh(new THREE.ConeGeometry(1.4, 0.5, 8), umbrellaMat);
    canopy.position.y = topY + 2.2; canopy.castShadow = true; g.add(canopy);
  }
  return g;
}
const tableXs = [-3, 1.5, 6, 10.5, 15];
tableXs.forEach((tx, i) => {
  const set = makeTableSet(i % 2 === 0);
  set.position.set(tx, -0.05, COURT_OFFSET / 2);

// ---------- tribunitas chiquitas de metal (entre los postes) ----------
const blFrameMat = new THREE.MeshStandardMaterial({ color: 0x9aa1ab, roughness: 0.4, metalness: 0.9 });
const blSeatMat = new THREE.MeshStandardMaterial({
  map: loadTex('fine_grained_wood_col_1k.jpg', true, 5, 0.4),
  normalMap: loadTex('fine_grained_wood_nor_gl_1k.jpg', false, 5, 0.4),

  color: 0xffffff, roughness: 1, metalness: 0,
});
function makeBleacher(w) {
  const g = new THREE.Group();
  const rows = 3, rise = 0.4, run = 0.55;
  for (let i = 0; i < rows; i++) {
    const h = (i + 1) * rise, z = -i * run;
    // tabla de asiento
    const seat = new THREE.Mesh(new THREE.BoxGeometry(w, 0.06, 0.3), blSeatMat);
    seat.position.set(0, h, z); seat.castShadow = true; g.add(seat);
    // patas metálicas a cada lado
    [-w / 2 + 0.12, w / 2 - 0.12].forEach(sx => {
      const leg = new THREE.Mesh(new THREE.BoxGeometry(0.05, h, 0.05), blFrameMat);
      leg.position.set(sx, h / 2, z); leg.castShadow = true; g.add(leg);
    });
  }
  // largueros diagonales laterales (estructura)
  const dz = (rows - 1) * run, dy = (rows - 1) * rise;
  const len = Math.hypot(dz, dy) + 0.35;
  [-w / 2 + 0.12, w / 2 - 0.12].forEach(sx => {
    const rail = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.05, len), blFrameMat);
    rail.position.set(sx, rise + dy / 2, -dz / 2);
    rail.rotation.x = Math.atan2(dy, dz);
    g.add(rail);
  });
  return g;
}
// una tribunita en cada vano entre postes, lado externo de cada cancha
const bleacherXs = [-8, 0, 8];
bleacherXs.forEach(bx => {
  const b1 = makeBleacher(5);
  b1.position.set(bx, -0.05, -(H / 2 + 1.0)); // cancha 1, mira +z
  scene.add(b1);
  const b2 = makeBleacher(5);
  b2.position.set(bx, -0.05, COURT_OFFSET + (H / 2 + 1.0)); // cancha 2, mira -z
  b2.rotation.y = Math.PI;
  scene.add(b2);
});

// ---------- cerco del rectángulo central (anti-robo) + puerta ----------
// los lados largos ya los cierran los alambrados de las dos canchas;
// solo hay que cerrar las dos puntas (en X)
const corrZ1 = H / 2;                 // 10: alambrado cancha 1
const corrZ2 = COURT_OFFSET - H / 2;  // 20: alambrado cancha 2
const corrLen = corrZ2 - corrZ1;      // 10
const corrCz = (corrZ1 + corrZ2) / 2; // 15
const corrXend = W / 2;               // 20
const dwc = 2.4;                      // ancho de la puerta

function corrPost(x, z) {
  const h = fenceH + 0.3;
  const p = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.09, h, 10), postMat);
  p.position.set(x, h / 2, z); p.castShadow = true; scene.add(p);
}

// punta del fondo (-X): cerrada (detrás de la cantina)
{
  const panel = fencePanel(corrLen, fenceH, corrLen / 2);
  panel.rotation.y = Math.PI / 2;
  panel.position.set(-corrXend, fenceH / 2, corrCz);
  scene.add(panel);
  corrPost(-corrXend, corrZ1); corrPost(-corrXend, corrZ2);
}

// punta del frente (+X): con puerta
{
  const sideLen = (corrLen - dwc) / 2;
  [-1, 1].forEach(s => {
    const panel = fencePanel(sideLen, fenceH, sideLen / 2);
    panel.rotation.y = Math.PI / 2;
    panel.position.set(corrXend, fenceH / 2, corrCz + s * (dwc / 2 + sideLen / 2));
    scene.add(panel);
  });
  corrPost(corrXend, corrZ1); corrPost(corrXend, corrZ2);
  corrPost(corrXend, corrCz - dwc / 2); corrPost(corrXend, corrCz + dwc / 2);

  // portón (abre hacia adentro)
  const cgate = new THREE.Group();
  const fr = new THREE.MeshStandardMaterial({ color: 0x2a2e33, metalness: 0.5, roughness: 0.5 });
  const pA = new THREE.Mesh(new THREE.BoxGeometry(0.12, fenceH, 0.12), fr); pA.position.set(0, fenceH / 2, 0);
  const pB = new THREE.Mesh(new THREE.BoxGeometry(0.12, fenceH, 0.12), fr); pB.position.set(0, fenceH / 2, dwc);
  const tp = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.12, dwc), fr); tp.position.set(0, fenceH, dwc / 2);
  const bt = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.12, dwc), fr); bt.position.set(0, 0.06, dwc / 2);
  [pA, pB, tp, bt].forEach(p => { p.castShadow = true; cgate.add(p); });
  const t = fenceTex.clone(); t.needsUpdate = true; t.repeat.set(dwc / 2, fenceH / 2);
  const mat = fenceMat.clone(); mat.map = t;
  const gmesh = new THREE.Mesh(new THREE.PlaneGeometry(dwc, fenceH), mat);
  gmesh.rotation.y = Math.PI / 2; gmesh.position.set(0, fenceH / 2, dwc / 2);
  cgate.add(gmesh);
  cgate.position.set(corrXend, 0, corrCz - dwc / 2); // bisagra
  cgate.rotation.y = -1.0;                            // abierto hacia adentro
  scene.add(cgate);
}

// ---------- cartel del complejo: "LA DIVIDIDA F6" ----------
function signNameTex() {
  const cv = document.createElement('canvas'); cv.width = 1024; cv.height = 256;
  const x = cv.getContext('2d');
  x.fillStyle = '#0f2e1f'; x.fillRect(0, 0, 1024, 256);
  x.fillStyle = '#ffd24a'; x.fillRect(0, 0, 1024, 14); x.fillRect(0, 242, 1024, 14);
  x.textAlign = 'center'; x.textBaseline = 'middle';
  x.fillStyle = '#ffffff'; x.font = 'bold 120px Arial, sans-serif';
  x.fillText('LA DIVIDIDA', 512, 98);
  x.fillStyle = '#ffd24a'; x.font = 'bold 66px Arial, sans-serif';
  x.fillText('— F6 —', 512, 190);
  const t = new THREE.CanvasTexture(cv);
  t.colorSpace = THREE.SRGBColorSpace;
  t.anisotropy = renderer.capabilities.getMaxAnisotropy();
  return t;
}
function makeSign() {
  const g = new THREE.Group();
  const sw = 9, sh = 2.2, postH = 5;
  [-1, 1].forEach(s => {
    const p = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.15, postH + sh, 12), postMat);
    p.position.set(s * (sw / 2 - 0.4), (postH + sh) / 2, 0); p.castShadow = true; g.add(p);
  });
  const board = new THREE.Mesh(new THREE.BoxGeometry(sw, sh, 0.25),
    new THREE.MeshStandardMaterial({ color: 0x0f2e1f, roughness: 0.6, metalness: 0.1 }));
  board.position.set(0, postH + sh / 2, 0); board.castShadow = true; g.add(board);
  const tex = signNameTex();
  [-1, 1].forEach(s => {
    const face = new THREE.Mesh(new THREE.PlaneGeometry(sw - 0.2, sh - 0.2),
      new THREE.MeshStandardMaterial({ map: tex, roughness: 0.5 }));
    face.position.set(0, postH + sh / 2, s * 0.14);
    if (s < 0) face.rotation.y = Math.PI;
    g.add(face);
  });
  return g;
}
const sign = makeSign();
sign.position.set(0, -0.05, -(H / 2 + 4)); // al frente del predio

// ---------- cotas / medidas (tipo plano) ----------
const dimsGroup = new THREE.Group();
scene.add(dimsGroup);
function makeLabel(text) {
  const cv = document.createElement('canvas'); cv.width = 256; cv.height = 72;
  const x = cv.getContext('2d');
  x.fillStyle = 'rgba(18,22,28,0.88)'; x.fillRect(0, 0, 256, 72);
  x.strokeStyle = '#ffe24a'; x.lineWidth = 4; x.strokeRect(2, 2, 252, 68);
  x.fillStyle = '#ffe24a'; x.font = 'bold 40px Arial, sans-serif';
  x.textAlign = 'center'; x.textBaseline = 'middle';
  x.fillText(text, 128, 38);
  const tex = new THREE.CanvasTexture(cv); tex.colorSpace = THREE.SRGBColorSpace;
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, depthTest: false, transparent: true }));
  sp.scale.set(4.2, 1.2, 1);
  return sp;
}
function makeDimension(ax, az, bx, bz, text) {
  const y = 0.15, col = 0xffe24a;
  const lineMat = new THREE.LineBasicMaterial({ color: col, depthTest: false });
  const add = pts => dimsGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), lineMat));
  add([new THREE.Vector3(ax, y, az), new THREE.Vector3(bx, y, bz)]);
  const dx = bx - ax, dz = bz - az, len = Math.hypot(dx, dz) || 1;
  const px = -dz / len, pz = dx / len, t = 0.7; // perpendicular para los topes
  [[ax, az], [bx, bz]].forEach(([cx, cz]) =>
    add([new THREE.Vector3(cx + px * t, y, cz + pz * t), new THREE.Vector3(cx - px * t, y, cz - pz * t)]));
  const lab = makeLabel(text);
  lab.position.set((ax + bx) / 2, 1.1, (az + bz) / 2);
  dimsGroup.add(lab);
}
// medidas principales
makeDimension(-W / 2, -(H / 2 + 2.5), W / 2, -(H / 2 + 2.5), W + ' m');          // largo cancha
makeDimension(-(W / 2 + 2.5), -H / 2, -(W / 2 + 2.5), H / 2, H + ' m');          // ancho cancha
makeDimension(W / 2 + 2.5, H / 2, W / 2 + 2.5, COURT_OFFSET - H / 2, (COURT_OFFSET - H) + ' m'); // pasillo central
makeDimension(W / 2 + 4.5, -(H / 2 + 2), W / 2 + 4.5, COURT_OFFSET + H / 2 + 2, (COURT_OFFSET + H + 4) + ' m'); // largo predio
makeDimension(-W / 2, COURT_OFFSET + H / 2 + 4, W / 2, COURT_OFFSET + H / 2 + 4, (W + 4) + ' m'); // ancho predio

sun.shadow.camera.top = 55; sun.shadow.camera.bottom = -55;
sun.shadow.camera.near = 1; sun.shadow.camera.far = 160;
sun.shadow.bias = -0.0003;

// ---------- cielo HDRI (Poly Haven, CC0) + día/noche ----------
let envMap = null;
let dayMode = true;
let lampIntensity = 110;
const pmrem = new THREE.PMREMGenerator(renderer);
pmrem.compileEquirectangularShader();
new RGBELoader().load('textures/clarens_midday_1k.hdr', (hdr) => {
  hdr.mapping = THREE.EquirectangularReflectionMapping;
  envMap = pmrem.fromEquirectangular(hdr).texture;
  hdr.dispose(); pmrem.dispose();
  if (dayMode) setDay(); // aplicar entorno una vez cargado
});

function setDay() {
  dayMode = true;
  scene.environment = envMap;                       // reflejos/iluminación reales
  scene.background = envMap || new THREE.Color(0x9ec9e8);
  scene.fog = new THREE.Fog(0xaecadb, 90, 220);
  renderer.toneMappingExposure = 1.0;
  sun.intensity = 2.0; hemi.intensity = 0.35;
  lampTargets.forEach(s => s.intensity = 0);
}
function setNight() {
  dayMode = false;
  scene.environment = null;
  scene.background = new THREE.Color(0x070b16);
  scene.fog = new THREE.Fog(0x070b16, 50, 140);
  renderer.toneMappingExposure = 1.0;
  sun.intensity = 0.06; hemi.intensity = 0.09;
  lampTargets.forEach(s => s.intensity = lampIntensity * (s.userData.factor || 1));
}
setDay();
document.getElementById('btnDay').onclick = setDay;
document.getElementById('btnNight').onclick = setNight;
document.getElementById('btnDims').onclick = () => { dimsGroup.visible = !dimsGroup.visible; };

// slider de intensidad de las luces (en vivo)
const lightSlider = document.getElementById('lightSlider');
const lightVal = document.getElementById('lightVal');
lightSlider.addEventListener('input', () => {
  lampIntensity = +lightSlider.value;
  lightVal.textContent = lightSlider.value;
  if (!dayMode) lampTargets.forEach(s => s.intensity = lampIntensity * (s.userData.factor || 1));
});

// ---------- loop ----------
function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
window.addEventListener('resize', onResize);

document.getElementById('loading').style.display = 'none';
window.__cam = camera; window.__controls = controls; // hook para screenshots

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
